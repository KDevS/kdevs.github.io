<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STARTKLAR FÜR LEADERSHIP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #6B7B1A 0%, #5c6a14 100%);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Loading state while translations load */
        body.loading * {
            opacity: 0.7;
        }

        body.translation-loaded * {
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .main-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            min-height: 0;
            padding-top: 80px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            width: 100%;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
            top: 0;
        }

        .header h1 {
            margin: 0;
            font-size: 2.2em;
            font-weight: 300;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
            line-height: 1.2;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-top: 20px;
            flex-shrink: 0;
            max-width: 100%;
            min-height: 350px;
            align-content: start;
        }

        .menu-item {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            animation: slideInUp 0.6s ease forwards;
            opacity: 0;
            transform: translateY(30px);
            min-height: 70px;
            max-height: 70px;
            margin-bottom: 0;
        }

        .menu-item:hover,.menu-item.selected {
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .menu-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .menu-item:hover::before {
            left: 100%;
        }

        .tool-icon {
            width: 45px;
            height: 45px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .menu-text {
            flex: 1;
        }

        .menu-text h3 {
            margin: 0;
            font-size: 1.2em;
            font-weight: 500;
            line-height: 1.3;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        @keyframes slideInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-height: 600px) {
            .main-container {
                padding-top: 60px;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .menu-item {
                padding: 15px;
                min-height: 60px;
                max-height: 60px;
            }

            .tool-icon {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }

            .menu-text h3 {
                font-size: 1.1em;
            }

            .menu-grid {
                min-height: 280px;
            }
        }

        /* Animation for smooth entrance */
        .container {
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body class="loading">
    <button class="close-btn" onclick="closeSubmenu()">×</button>
    <div class="main-container">
        <div class="container">
            <div class="header">
                <h1 data-translate="txt_Layer_1_Sinn_Content_SubMenu_1_1">STARTKLAR FÜR LEADERSHIP</h1>
            </div>
            <div class="menu-grid">
                <div class="menu-item" id='startklar-fuer-leadership-2' onclick="openContent('Layer-2-LeadershipHacks-LeadershipReady')"
                    style="animation-delay: 0.1s;">
                    <div class="tool-icon">🔧</div>
                    <div class="menu-text">
                        <h3 data-translate="txt_Layer_1_Sinn_Content_SubMenu_1_1">Startklar für Leadership</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Translation System for iframe communication with PlayCanvas
        class IframeTranslationSystem {
            constructor() {
                this.translations = {};
                this.isReady = false;
                this.pendingRequests = new Map();
                this.requestId = 0;
                this.currentLanguage = "DE";
                
                // Listen for messages from parent (PlayCanvas)
                window.addEventListener('message', this.handleMessage.bind(this));
                
                // Request initial translations
                this.requestInitialTranslations();
            }

            handleMessage(event) {
                const { type, data, requestId, language } = event.data;
                
                switch(type) {
                    case 'translation-response':
                        this.handleTranslationResponse(data, requestId);
                        break;
                    case 'language-changed':
                        this.handleLanguageChange(data);
                        break;
                    case 'bulk-translations':
                        this.currentLanguage = (language)? language : this.currentLanguage;
                        this.handleBulkTranslations(data);
                        this.handleTranslationHideElements();
                        break;
                }
            }

            // Request all necessary translations on load
            requestInitialTranslations() {
                const translationKeys = this.getAllTranslationKeys();
                
                const request = {
                    type: 'request-bulk-translations',
                    keys: translationKeys,
                    requestId: ++this.requestId
                };
                
                window.parent.postMessage(request, '*');
            }

            // Get all translation keys from document
            getAllTranslationKeys() {
                const elements = document.querySelectorAll('[data-translate]');
                return Array.from(elements).map(el => el.getAttribute('data-translate'));
            }

            getAllTranslationHideElements(){
                const elements = document.querySelectorAll('[hide-on-translate]');
                return elements;
            }

            // Handle bulk translations response
            handleBulkTranslations(translations) {
                this.translations = translations.data || translations;
                this.isReady = true;
                
                this.applyTranslations();
                
                // Remove loading class
                document.body.classList.remove('loading');
                document.body.classList.add('translation-loaded');
            }

            handleTranslationHideElements(){
                const hideElements = this.getAllTranslationHideElements();
                for(let i = 0; i < hideElements.length; i++){
                    let hiddenOnLangs = hideElements[i].getAttribute('hide-on-translate').split(",");
                    console.log(hiddenOnLangs);
                    if(hiddenOnLangs.indexOf(this.currentLanguage) != -1){
                        hideElements[i].style.display = "none";
                    }else{
                        hideElements[i].style.display = "";
                    }
                }
            }

            // Apply translations to all elements
            applyTranslations() {
                const elements = document.querySelectorAll('[data-translate]');
                
                elements.forEach((element) => {
                    const key = element.getAttribute('data-translate');
                    const translation = this.translations[key];
                    
                    if (translation && translation.trim() != "") {
                        element.style.display = "";
                        if (element.tagName.toLowerCase() === 'input') {
                            element.placeholder = translation;
                        } else if (element.innerHTML.includes('<')) {
                            // Preserve basic HTML structure
                            const newHTML = element.innerHTML.replace(/Loading\.\.\./, translation);
                            element.innerHTML = newHTML;
                        } else {
                            element.textContent = translation;
                        }
                    }else{
                        element.style.display = "none";
                    }
                });
            }

            // Handle language change
            handleLanguageChange(newLanguage) {
                this.requestInitialTranslations();
            }

            // Request individual translation (for dynamic content)
            async requestTranslation(key, fallback = '') {
                if (this.translations[key]) {
                    return this.translations[key];
                }

                return new Promise((resolve) => {
                    const requestId = ++this.requestId;
                    this.pendingRequests.set(requestId, resolve);
                    
                    const request = {
                        type: 'request-translation',
                        key: key,
                        fallback: fallback,
                        requestId: requestId
                    };
                    
                    window.parent.postMessage(request, '*');
                });
            }

            // Handle individual translation response
            handleTranslationResponse(data, requestId) {
                const resolve = this.pendingRequests.get(requestId);
                if (resolve) {
                    resolve(data.translation);
                    this.pendingRequests.delete(requestId);
                }
            }
        }

        // Navigation functions
        function closeSubmenu() {
            window.parent.postMessage({
                type: 'close-submenu'
            }, '*');
        }

        function openContent(contentId) {
            window.parent.postMessage({
                type: 'open-content',
                contentId: contentId
            }, '*');
        }

        // Initialize translation system
        document.addEventListener('DOMContentLoaded', function() {
            window.translationSystem = new IframeTranslationSystem();
        });

        // Escape key handler
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeSubmenu();
            }

            if(e.key === 'ArrowUp'){
                const newSelectedElement = document.getElementById('startklar-fuer-leadership-2');
                newSelectedElement.classList.add("selected");
            }

            if(e.key === 'ArrowDown'){  
                const newSelectedElement = document.getElementById('startklar-fuer-leadership-3');
                newSelectedElement.classList.add("selected");
            }

            if(e.key === 'Enter'){
                openContent('Layer-2-LeadershipHacks-LeadershipReady');
            }

            if(e.key == 'l' || e.key == 'L'){
                window.parent.postMessage({
                    type: 'cycle-through-language',
                }, '*');
            }
        });
    </script>
</body>

</html>
