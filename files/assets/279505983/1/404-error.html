<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - VBS Leadership Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans', sans-serif;
            background: linear-gradient(135deg, #e8f4f8 0%, #d1e7dd 100%);
            color: #333;
            line-height: 1.6;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 600px;
            animation: fadeInUp 0.8s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #576715, #6b7b1a);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            color: white;
            margin: 0 auto 30px;
            box-shadow: 0 8px 32px rgba(87, 103, 21, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .error-number {
            font-size: 8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #576715, #6b7b1a);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 20px;
        }

        .error-title {
            font-size: 2rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 15px;
        }

        .error-message {
            font-size: 1.2rem;
            color: #666;
            font-weight: 400;
            line-height: 1.8;
        }

        /* Swiss Federal Design Element */
        .swiss-accent {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(90deg, #dc143c 0%, #dc143c 33%, white 33%, white 66%, #dc143c 66%);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .error-number {
                font-size: 5rem;
            }

            .error-title {
                font-size: 1.5rem;
            }

            .error-message {
                font-size: 1rem;
            }

            .error-icon {
                width: 100px;
                height: 100px;
                font-size: 48px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="error-icon">❓</div>

        <div class="error-number">404</div>

        <h1 class="error-title" data-translate="error_404_title">Seite nicht gefunden</h1>

        <p class="error-message" data-translate="error_404_message">
            Der angeforderte Inhalt existiert nicht oder die URL ist ungültig.
        </p>
    </div>

    <script>
        // Translation System for 404 iframe - Compatible with PlayCanvas
    class Error404TranslationSystem {
        constructor() {
            this.translations = {};
            this.isReady = false;
            this.requestId = 0;
            this.currentLanguage = "DE";
            
            // Listen for messages from parent (PlayCanvas)
            window.addEventListener('message', this.handleMessage.bind(this));
            
            // Request initial translations
            this.requestInitialTranslations();
        }

        handleMessage(event) {
            const { type, data, language } = event.data;
            
            switch(type) {
                case 'bulk-translations':
                    this.currentLanguage = language || this.currentLanguage;
                    this.handleBulkTranslations(data);
                    break;
                case 'language-changed':
                    this.handleLanguageChange(data);
                    break;
            }
        }

        requestInitialTranslations() {
            const translationKeys = this.getAllTranslationKeys();
            
            const request = {
                type: 'request-bulk-translations',
                keys: translationKeys,
                requestId: ++this.requestId
            };
            
            console.log('📤 [404] Requesting translations:', translationKeys);
            window.parent.postMessage(request, '*');
        }

        getAllTranslationKeys() {
            const elements = document.querySelectorAll('[data-translate]');
            return Array.from(elements).map(el => el.getAttribute('data-translate'));
        }

        handleBulkTranslations(translations) {
            console.log('📥 [404] Received translations:', translations);
            this.translations = translations.data || translations;
            this.isReady = true;
            this.applyTranslations();
        }

        applyTranslations() {
            const elements = document.querySelectorAll('[data-translate]');
            
            elements.forEach((element) => {
                const key = element.getAttribute('data-translate');
                const translation = this.translations[key];
                
                if (translation && translation.trim() !== "") {
                    console.log('✅ [404] Applying translation:', key, '→', translation);
                    element.style.display = "";
                    
                    if (element.tagName.toLowerCase() === 'input') {
                        element.placeholder = translation;
                    } else if (translation.includes('<') && translation.includes('>')) {
                        element.innerHTML = translation;
                    } else {
                        element.textContent = translation;
                    }
                } else {
                    console.warn('⚠️ [404] No translation for:', key);
                    // Don't hide on 404 page - keep fallback text
                }
            });
            
            // Update page title
            const titleElement = document.querySelector('[data-translate="error_404_title"]');
            if (titleElement && titleElement.textContent) {
                document.title = "404 - " + titleElement.textContent;
            }
        }

        handleLanguageChange(newLanguage) {
            console.log('🌍 [404] Language changed to:', newLanguage);
            this.requestInitialTranslations();
        }
    }

    // Initialize on DOM ready
    document.addEventListener('DOMContentLoaded', function() {
        console.log('🚀 [404] Initializing translation system...');
        window.translationSystem = new Error404TranslationSystem();
    });

    // Prevent back button navigation
    window.addEventListener('popstate', function(event) {
        window.history.pushState(null, '', window.location.href);
    });

    // Block initial back button
    window.history.pushState(null, '', window.location.href);
    </script>
</body>

</html>
